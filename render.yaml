services:
  - type: web
    runtime: docker
    name: envvault-staging
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEV_AUTH_ENABLED
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
